name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compilar proyecto
        run: mvn -B clean compile

      - name: Ejecutar tests (usa Mongo embebido, no requiere servicio externo)
        run: mvn -B test

      - name: Publicar reporte de tests (Surefire)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 7

      - name: Empaquetar (verifica que el JAR se construya bien)
        run: mvn -B package -DskipTests