<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo Mongo API - Acceso</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <h1>Demo Mongo API</h1>
      <p class="subtitle">Gestion de productos y clientes</p>

      <div class="auth-tabs">
        <button class="active" data-mode="login">Iniciar sesion</button>
        <button data-mode="registro">Registrarse</button>
      </div>

      <div id="authError" class="error-msg"></div>

      <form id="authForm">
        <h2 id="formTitle">Iniciar sesion</h2>

        <div class="form-group">
          <label for="username">Usuario</label>
          <input type="text" id="username" autocomplete="username" required>
        </div>

        <div class="form-group">
          <label for="password">Contrasena</label>
          <input type="password" id="password" autocomplete="current-password" required>
        </div>

        <button type="submit" class="btn btn-primary" id="submitBtn">Entrar</button>

        <p style="text-align:center;margin-top:1rem;font-size:0.85rem;color:var(--text-muted)">
          <span id="toggleText">No tienes cuenta? <a href="#" id="toggleMode">Registrate</a></span>
        </p>
      </form>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
