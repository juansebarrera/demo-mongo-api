# ===========================================================================
# AVISO: Este archivo contiene valores de ejemplo para desarrollo.
# En producción, genera los valores base64 con:
#   echo -n 'tu-valor' | base64
#
# JWT_SECRET DEBE tener al menos 32 bytes (256 bits) para HMAC-SHA.
# Ejemplo:
#   openssl rand -base64 32
# ===========================================================================
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: demo-mongo-api
  labels:
    app.kubernetes.io/name: demo-mongo-api
    app.kubernetes.io/component: app
type: Opaque
data:
  # JWT_SECRET: mínimo 32 bytes para JJWT HMAC-SHA256
  JWT_SECRET: L0pjc+NQes6u/0pAqZq4rg3z6TFZKWfQJoqnnnG14uo=
  # ADMIN_SEED_PASSWORD: contraseña del usuario admin seeder (dev/test)
  ADMIN_SEED_PASSWORD: YWRtaW4xMjM=
  # SPRING_MONGODB_URI: URI completa de conexión a MongoDB
  # Decoded: mongodb://admin:adminpassword@mongo:27017/demo_mongo_api?authSource=admin
  SPRING_MONGODB_URI: bW9uZ29kYjovL2FkbWluOmFkbWlucGFzc3dvcmRAbW9uZ286MjcwMTcvZGVtb19tb25nb19hcGk/YXV0aFNvdXJjZT1hZG1pbg==
  # Credenciales de MongoDB para el StatefulSet (solo se usan en la primera inicialización)
  MONGO_INITDB_ROOT_USERNAME: YWRtaW4=
  MONGO_INITDB_ROOT_PASSWORD: YWRtaW5wYXNzd29yZA==
