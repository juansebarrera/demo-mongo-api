# ===========================================================================
# AVISO: Este archivo contiene valores de ejemplo.
# En producción, genera los valores base64 con:
#   echo -n 'tu-valor' | base64
#
# Ejemplo:
#   echo -n 'mi-jwt-secret' | base64
#   → bWktand0LXNlY3JldA==
# ===========================================================================
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: demo-mongo-api
  labels:
    app.kubernetes.io/name: demo-mongo-api
    app.kubernetes.io/component: app
type: Opaque
data:
  # JWT_SECRET: <base64 de tu JWT_SECRET>
  JWT_SECRET: bWktand0LXNlY3JldA==
  # ADMIN_SEED_PASSWORD: <base64 de tu contraseña admin>
  ADMIN_SEED_PASSWORD: YWRtaW4xMjM=
  # SPRING_MONGODB_URI: URI completa con credenciales en base64
  # Valor decoded: mongodb://admin:adminpassword@mongo:27017/demo_mongo_api?authSource=admin
  SPRING_MONGODB_URI: bW9uZ29kYjovL2FkbWluOmFkbWlucGFzc3dvcmRAbW9uZ286MjcwMTcvZGVtb19tb25nb19hcGk/YXV0aFNvdXJjZT1hZG1pbg==
  # Credenciales de MongoDB para el StatefulSet
  MONGO_INITDB_ROOT_USERNAME: YWRtaW4=
  MONGO_INITDB_ROOT_PASSWORD: YWRtaW5wYXNzd29yZA==
