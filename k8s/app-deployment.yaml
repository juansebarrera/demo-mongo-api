apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  namespace: demo-mongo-api
  labels:
    app.kubernetes.io/name: demo-mongo-api
    app.kubernetes.io/component: app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app
  template:
    metadata:
      labels:
        app: app
    spec:
      containers:
        - name: app
          image: ghcr.io/juansebarrera/demo-mongo-api:latest
          ports:
            - containerPort: 8080
          envFrom:
            - secretKeyRef:
                name: app-secrets
                keys:
                  - JWT_SECRET
                  - ADMIN_SEED_PASSWORD
                  - SPRING_MONGODB_URI
            - configMapKeyRef:
                name: app-config
                keys:
                  - SPRING_PROFILES_ACTIVE
                  - JWT_EXPIRATION
                  - JWT_REFRESH_EXPIRATION
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
