apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: demo-mongo-api
  labels:
    app.kubernetes.io/name: demo-mongo-api
    app.kubernetes.io/component: app
data:
  SPRING_PROFILES_ACTIVE: "prod"
  # Nota: SPRING_MONGODB_URI está en Secrets porque contiene credenciales.
  # Este ConfigMap es para variables no sensibles.
  JWT_EXPIRATION: "86400000"
  JWT_REFRESH_EXPIRATION: "604800000"
