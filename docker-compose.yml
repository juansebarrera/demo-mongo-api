services:
  mongo:
    image: mongo:7
    container_name: demo-mongo-db
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: adminpassword
      MONGO_INITDB_DATABASE: demo_mongo_api
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: ${APP_IMAGE:-ghcr.io/juansebarrera/demo-mongo-api:latest}
    container_name: demo-mongo-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_MONGODB_URI: mongodb://admin:adminpassword@mongo:27017/demo_mongo_api?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: 86400000
      JWT_REFRESH_EXPIRATION: 604800000
      SPRING_PROFILES_ACTIVE: dev
      ADMIN_SEED_USERNAME: admin
      ADMIN_SEED_PASSWORD: ${ADMIN_SEED_PASSWORD}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo-data: